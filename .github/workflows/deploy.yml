name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          debug: true
          script: |
            set -e
            cd ~/projects/mediascope
            git pull origin main
            docker compose build
            docker compose up -d
            docker compose exec -T backend python -m alembic upgrade head || echo "Alembic: no new migrations"
            echo "Deploy done: $(date)"
